<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Code Flow Board</title>
    <link rel="stylesheet" href="code-flow-board/styles.module.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Vibe coding map</p>
          <h1>Code Flow Board</h1>
        </div>
        <div class="actions">
          <label class="search">
            <span id="searchLabel">검색</span>
            <input id="searchInput" type="search" placeholder="컴포넌트, 파일, 역할">
          </label>
          <label class="language">
            <span id="languageLabel">언어</span>
            <select id="languageSelect">
              <option value="ko">한국어</option>
              <option value="en">English</option>
            </select>
          </label>
          <a class="button" href="generated/code-flow.mmd">Mermaid</a>
          <a class="button primary" href="generated/code-flow.json">JSON</a>
        </div>
      </header>

      <section class="summary" id="summary"></section>

      <section class="workspace">
        <aside class="panel">
          <div class="panelHeader">
            <h2 id="rolesTitle">역할</h2>
            <button id="clearFilter" type="button">초기화</button>
          </div>
          <div class="roleList" id="roleList"></div>
          <div class="legend">
            <p><span class="key process"></span><span id="legendProcess">처리</span></p>
            <p><span class="key decision"></span><span id="legendDecision">판단</span></p>
            <p><span class="key data"></span><span id="legendData">저장소</span></p>
            <p><span class="key io"></span><span id="legendIo">입출력</span></p>
            <p><span class="key document"></span><span id="legendDocument">문서</span></p>
          </div>
        </aside>

        <section class="canvasPanel">
          <div class="panelHeader">
            <h2 id="flowTitle">흐름</h2>
            <p id="flowMeta"></p>
          </div>
          <div class="graphWrap">
            <svg id="flowGraph" role="img" aria-label="Code flow graph"></svg>
          </div>
        </section>

        <aside class="panel detailPanel">
          <div class="panelHeader">
            <h2 id="detailsTitle">상세</h2>
          </div>
          <div id="details" class="details"></div>
        </aside>
      </section>
    </main>

    <script src="generated/code-flow-data.js"></script>
    <script src="code-flow-board/i18n.js"></script>
    <script src="code-flow-board/summaries.js"></script>
    <script src="code-flow-board/board.js"></script>
  </body>
</html>
