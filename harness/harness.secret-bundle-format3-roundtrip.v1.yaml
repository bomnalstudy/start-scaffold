target: format 3 secret bundle roundtrip
why: cross-environment secret exchange must stay stable after the native-wsl-linux upgrade
level: Script Harness
scenario: harness.secret-bundle-format3-roundtrip.v1.yaml
preconditions:
  - export-project-secrets exists for the active runtime
  - import-project-secrets exists for the active runtime
  - a temporary local secret env file can be created and cleaned up
actions:
  - export a temporary secret env file to a format 3 vault
  - import the vault back into a restored env file
assertions:
  - bundle format is 3
  - cipher name is aes-256-cbc
  - restored env contains the original values
failure_output:
  - Scenario
  - Step
  - Expected
  - Actual
run_command: .\scripts\run-harness-checks.ps1 -Scenario secret-bundle-format3-roundtrip
notes:
  - the bash runner validates the same scenario through native-wsl-linux entrypoints
